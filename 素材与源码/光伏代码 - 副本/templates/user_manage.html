<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户信息</title>

    <!-- 预加载静态 CSS 资源 -->
    <link rel="preload" as="style" href="{{ url_for('static', filename='css/info.css') }}">
    <link rel="preload" as="style" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css">

    <!-- 实际加载 CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/info.css') }}">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css">

    <!-- 延迟加载 Bootstrap JS -->
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.3/js/bootstrap.bundle.min.js" defer></script>
</head>

<body>
<header class="site-header">
    <div class="container d-flex align-items-center justify-content-between py-2">
        <!-- Logo区域 -->
        <div class="logo d-flex align-items-center">
            <div class="brand-cn"><a href="{{ url_for('user_manage') }}">光伏发电系统</a></div>
        </div>

        <!-- 主导航（居中） -->
        <nav class="main-nav d-flex align-items-center flex-grow-1 justify-content-center">
            <ul class="nav-list list-unstyled d-flex mb-0">
                <li><a href="/">首页</a></li>
                <li><a href="{{ url_for('weather_power') }}">发电预测</a></li>
                <li><a href="{{ url_for('introduction') }}">关于我们</a></li>
                <li><a href="{{ url_for('contaction') }}">联系我们</a></li>
            </ul>
        </nav>

        <!-- 用户登录区域（右侧） -->
        <div class="user-auth">
                <div class="dropdown">
                    <button class="btn btn-outline-success btn-sm dropdown-toggle" data-bs-toggle="dropdown">
                        欢迎 {{ session['username'] }}
                    </button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item text-danger" href="{{ url_for('logout') }}">退出登录</a></li>
                    </ul>
                </div>
        </div>
    </div>
</header>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <a href="/info" class="back-link">&lt; 前往发电站管理页面</a>
        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#newUserModal">+ 添加新用户</button>
    </div>

    <!-- 模态框 -->
    <div class="modal fade" id="newUserModal" tabindex="-1" aria-labelledby="newUserModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="newUserModalLabel">添加新用户</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form method="POST" action="/register">
                        <div class="mb-3">
                            <label class="form-label">用户名</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">密码</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">发电站编号 (ID)</label>
                            <input type="text" name="new_id" class="form-control" required>
                        </div>
                        <div class="modal-footer">
                            <button type="submit" class="btn btn-success">添加</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        {% for user in users %}
        <div class="col-md-6">
            <div class="card p-3 user-card" id="user-card-{{ user.user_id }}">
                <h5>{{ user.username }}</h5>
                <p>密码：<span id="password-{{ user.user_id }}">{{ user.password }}</span></p>
                <p>角色：<span id="role-{{ user.user_id }}">{{ user.role }}</span></p>
                <div>
                    发电站：
                    {% for station in user.stations %}
                        <span>{{ station }}</span>{% if not loop.last %}, {% endif %}
                    {% endfor %}
                </div>
                <button class="btn btn-sm btn-primary mt-2" onclick="toggleEditForm({{ user.user_id }})">修改信息</button>

                <!-- 编辑表单浮层 -->
                <div class="edit-popup d-none" id="edit-form-{{ user.user_id }}">
                    <form method="POST" action="/update_user">
                        <input type="hidden" name="id" value="{{ user.user_id }}">
                        <div class="mb-2">
                            <label class="form-label">新密码：</label>
                            <input type="text" name="password" class="form-control password-input" id="input-password-{{ user.user_id }}" required>
                        </div>
                        <div class="mb-2">
                            <label class="form-label">角色：</label>
                            <select name="role" class="form-select">
                                <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>admin</option>
                                <option value="viewer" {% if user.role == 'viewer' %}selected{% endif %}>viewer</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-success btn-sm">保存</button>
                        <button type="button" class="btn btn-sm btn-danger" onclick="deleteUser({{ user.user_id }})">删除用户</button>
                        <button type="button" class="btn btn-secondary btn-sm" onclick="hideEditForm({{ user.user_id }})">取消</button>
                    </form>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
<script>
        function toggleEditForm(userId) {
            const form = document.getElementById(`edit-form-${userId}`);
            const allForms = document.querySelectorAll('.edit-popup');
            allForms.forEach(f => f.classList.add('d-none'));
            form.classList.toggle('d-none');

            const oldPassword = document.getElementById(`password-${userId}`).innerText;
            document.getElementById(`input-password-${userId}`).value = oldPassword;
        }

        function hideEditForm(userId) {
            document.getElementById(`edit-form-${userId}`).classList.add('d-none');
        }

        function toggleNewUserForm() {
            const form = document.getElementById('new-user-form');
            const allForms = document.querySelectorAll('.edit-popup');
            allForms.forEach(f => f.classList.add('d-none'));
            form.classList.toggle('d-none');
        }

        function hideNewUserForm() {
            document.getElementById('new-user-form').classList.add('d-none');
        }

        // 点击其他地方关闭所有弹窗
        document.addEventListener('click', function(event) {
            const editForms = document.querySelectorAll('.edit-popup');
            let clickedInside = false;

            editForms.forEach(form => {
                if (form.contains(event.target) || form.previousElementSibling?.contains(event.target)) {
                    clickedInside = true;
                }
            });

            if (!clickedInside) {
                editForms.forEach(form => form.classList.add('d-none'));
            }
        });

        // 发送删除请求
        function deleteUser(userId) {
            if (!confirm("确定要删除该用户吗？")) return;

            fetch(`/delete_user/${userId}`, {
                method: 'DELETE',
                headers: {
                    'Content-Type': 'application/json',
                }
            })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        // 后端返回了重定向 URL，我们手动跳转
                        window.location.href = data.redirect_url;
                    } else {
                        alert("删除失败");
                    }
                })
                .catch(error => {
                    console.error("请求出错", error);
                    alert("删除失败");
                });
        }
</script>
</body>
</html>
