<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发电站信息</title>

    <!-- Bootstrap CSS 预加载 -->
    <link rel="preload" as="style" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css">

    <!-- 地图 JS 预加载 -->
    <link rel="preload" as="script" href="https://webapi.amap.com/loader.js">

    <!-- 本地 CSS 文件 -->
    <link rel="preload" as="style" href="{{ url_for('static', filename='css/info.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/info.css') }}">

    <!-- Bootstrap JS 延迟加载 -->
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.3/js/bootstrap.bundle.min.js" defer></script>

    <!-- AMap 异步加载 -->
    <script src="https://webapi.amap.com/loader.js" async></script>

    <!-- 本地 JS 文件延迟加载 -->
    <script src="{{ url_for('static', filename='js/info.js') }}" defer></script>
</head>

<body>
<header class="site-header">
    <div class="container d-flex align-items-center justify-content-between py-2">
        <!-- Logo区域 -->
        <div class="logo d-flex align-items-center">
            <div class="brand-cn"><a href="{{ url_for('user_manage') }}">光伏发电系统</a></div>
        </div>

        <!-- 主导航（居中） -->
        <nav class="main-nav d-flex align-items-center flex-grow-1 justify-content-center">
            <ul class="nav-list list-unstyled d-flex mb-0">
                <li><a href="/">首页</a></li>
                <li><a href="{{ url_for('weather_power') }}">发电预测</a></li>
                <li><a href="{{ url_for('introduction') }}">关于我们</a></li>
                <li><a href="{{ url_for('contaction') }}">联系我们</a></li>
            </ul>
        </nav>

        <!-- 用户登录区域（右侧） -->
        <div class="user-auth">
                <div class="dropdown">
                    <button class="btn btn-outline-success btn-sm dropdown-toggle" data-bs-toggle="dropdown">
                        欢迎 {{ session['username'] }}
                    </button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item text-danger" href="{{ url_for('logout') }}">退出登录</a></li>
                    </ul>
                </div>
        </div>
    </div>
</header>

<!-- Toast 容器 -->
<div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1055">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="toast align-items-center text-bg-{{ category }} border-0" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="3000" data-bs-autohide="true">
        <div class="d-flex">
          <div class="toast-body">
            {{ message }}
          </div>
          <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
      </div>
    {% endfor %}
  {% endwith %}
</div>

<div class="container mt-4">
     <a href="/user_manage" class="back-link">&lt; 前往用户管理页面</a>
    <div class="row">
        <!-- 左侧表单 -->
        <div class="col-md-5">
            <div class="form-container">
                <h2>发电站信息</h2>
                <form method="get" action="{{ url_for('info') }}">
                    <label>发电站</label>
                    <select name="station_id" onchange="this.form.submit()" class="form-select mb-3">
                        {% for station in station_info %}
                            <option value="{{ station['ID'] }}"
                                    {% if station['ID'] == selected['ID'] %}selected{% endif %}>{{ station['ID'] }}</option>
                        {% endfor %}
                    </select>
                </form>

                <form id="info-form" method="post" action="{{ url_for('save_info') }}">
                    <input type="hidden" name="ID" value="{{ selected['ID'] }}">

                    <label>装机容量 (kW)</label>
                    <input type="text" class="form-control mb-2" name="capacity" value="{{ selected['装机容量'] }}"
                           required>

                    <label>安装角度 (°)</label>
                    <input type="text" class="form-control mb-2" name="perspective" value="{{ selected['角度'] }}"
                           required>

                    <label>经度</label>
                    <input type="text" id="longitude" class="form-control mb-2" name="longitude"
                           value="{{ selected['经度'] }}" required>

                    <label>纬度</label>
                    <input type="text" id="latitude" class="form-control mb-2" name="latitude"
                           value="{{ selected['纬度'] }}" required>

                    <label>全称</label>
                    <textarea id="fullname" class="form-control mb-2" name="fullname"
                              rows="2" required>{{ selected['全称'] | default('', true) }}</textarea>
                </form>

                <form id="delete-form" action="{{ url_for('delete_station') }}" method="post">
                    <input type="hidden" name="ID" value="{{ selected['ID'] }}">
                </form>

                <div class="form-group mt-3">
                    <button type="submit" class="btn btn-primary" form="info-form">保存信息</button>
                    <button type="button" class="btn btn-primary" data-bs-toggle="modal"
                            data-bs-target="#addStationModal">新增发电站
                    </button>
                    <button type="submit" class="btn btn-danger" form="delete-form"
                            onclick="return confirm('确定要删除当前发电站吗？')">删除当前发电站
                    </button>
                </div>
            </div>
        </div>

        <!-- 右侧地图 -->
        <div class="col-md-7">
            <div id="map-container" style="height: 700px;"></div>
        </div>
        <!-- Modal -->
        <div class="modal fade" id="addStationModal" tabindex="-1" aria-labelledby="addStationModalLabel"
             aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="addStationModalLabel">新增发电站</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form action="{{ url_for('add_station') }}" method="post">
                            <div class="mb-3">
                                <label for="new_id" class="form-label">新发电站 ID</label>
                                <input type="text" class="form-control" id="new_id" name="new_id" required>
                            </div>
                            <div class="mb-3">
                                <label for="target_user_id" class="form-label">选择用户</label>
                                <select class="form-select" name="target_user_id" id="target_user_id" required>
                                    {% for user in all_users %}
                                        <option value="{{ user.user_id }}">{{ user.username }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary">新增发电站</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const lng = document.getElementById("longitude").value;
        const lat = document.getElementById("latitude").value;
        initInfoMap(lng, lat);
    });
</script>

</html>
